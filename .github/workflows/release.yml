name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  security-events: write

jobs:
  build-release:
    name: Build release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake ninja-build

      - name: Configure
        run: cmake -S . -B build -G Ninja -DBUILD_TESTS=ON -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/stage"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: |
          set -euo pipefail
          ctest --test-dir build --output-on-failure | tee build/ctest.log

      - name: Install
        run: cmake --install build

      - name: Package release
        run: tar -C stage -czf "securebuild-${{ github.ref_name }}-linux-x86_64.tar.gz" .

      - name: Upload release package
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf
        with:
          name: release-package
          path: securebuild-${{ github.ref_name }}-linux-x86_64.tar.gz
          if-no-files-found: error

      - name: Build release image
        run: docker build -f docker/Dockerfile --target release -t securebuild:${{ github.ref_name }} .

      - name: Save release image
        run: |
          mkdir -p release-image
          docker save securebuild:${{ github.ref_name }} -o release-image/securebuild-image.tar

      - name: Upload release image
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf
        with:
          name: release-image
          path: release-image/securebuild-image.tar
          if-no-files-found: error

  security-gate:
    name: Security gate
    runs-on: ubuntu-22.04
    needs: build-release

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Download release image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-image
          path: artifacts/release-image

      - name: Load release image
        run: docker load -i artifacts/release-image/securebuild-image.tar

      - name: Fail on critical CVEs
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: image
          image-ref: securebuild:${{ github.ref_name }}
          format: table
          ignore-unfixed: true
          severity: CRITICAL
          exit-code: '1'
          vuln-type: os,library

      - name: Generate final SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: securebuild:${{ github.ref_name }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: securebuild:${{ github.ref_name }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload gate artifacts
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf
        with:
          name: release-security
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-22.04
    needs: [build-release, security-gate]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Download release package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-package
          path: artifacts/release-package

      - name: Download security artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-security
          path: artifacts/release-security

      - name: Download release image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-image
          path: artifacts/release-image

      - name: Load release image
        run: docker load -i artifacts/release-image/securebuild-image.tar

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push release image
        run: |
          docker tag securebuild:${{ github.ref_name }} ghcr.io/${{ github.repository_owner }}/securebuild:${{ github.ref_name }}
          docker tag securebuild:${{ github.ref_name }} ghcr.io/${{ github.repository_owner }}/securebuild:latest
          docker push ghcr.io/${{ github.repository_owner }}/securebuild:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository_owner }}/securebuild:latest

      - name: Generate release notes
        run: |
          previous_tag="$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -vx "${GITHUB_REF_NAME}" | head -n 1 || true)"
          if [ -n "${previous_tag}" ]; then
            git log --pretty='- %s' "${previous_tag}..${GITHUB_SHA}" > release-notes.md
          else
            git log --pretty='- %s' "${GITHUB_SHA}^..${GITHUB_SHA}" > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          body_path: release-notes.md
          files: |
            artifacts/release-package/securebuild-${{ github.ref_name }}-linux-x86_64.tar.gz
            artifacts/release-security/sbom.spdx.json
            artifacts/release-security/sbom.cyclonedx.json
          generate_release_notes: false
          fail_on_unmatched_files: true
