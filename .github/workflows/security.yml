name: security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  trivy-scan:
    name: Trivy image scan
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build release image
        run: docker build -f docker/Dockerfile --target release -t securebuild:scan .

      - name: Install Trivy
        run: |
          curl -fsSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b "${HOME}/.local/bin"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Scan image
        run: |
          trivy image \
            --scanners vuln \
            --severity CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy.sarif \
            --exit-code 1 \
            securebuild:scan

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc
        with:
          sarif_file: trivy.sarif

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf
        with:
          name: trivy-vulnerability-report
          path: trivy.sarif
          if-no-files-found: warn

  sbom-generate:
    name: Generate SBOM
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build release image
        run: docker build -f docker/Dockerfile --target release -t securebuild:sbom .

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "${HOME}/.local/bin"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Generate SPDX and CycloneDX SBOMs
        run: |
          syft packages docker:securebuild:sbom -o spdx-json=sbom.spdx.json
          syft packages docker:securebuild:sbom -o cyclonedx-json=sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
          if-no-files-found: error

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Trivy
        run: |
          curl -fsSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b "${HOME}/.local/bin"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Scan repository filesystem
        run: |
          trivy fs \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table \
            --output trivy-fs-report.txt \
            .

      - name: Upload repository report
        if: always()
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf
        with:
          name: trivy-filesystem-report
          path: trivy-fs-report.txt
          if-no-files-found: warn
