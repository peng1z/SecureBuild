name: security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  trivy-scan:
    name: Trivy image scan
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build release image
        run: docker build -f docker/Dockerfile --target release -t securebuild:scan .

      - name: Scan image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: image
          image-ref: securebuild:scan
          format: sarif
          output: trivy.sarif
          ignore-unfixed: true
          severity: CRITICAL
          exit-code: '1'
          vuln-type: os,library

      - name: Upload SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc
        with:
          sarif_file: trivy.sarif

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf
        with:
          name: trivysarifreport
          path: trivy.sarif
          if-no-files-found: warn

  sbom-generate:
    name: Generate SBOM
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build release image
        run: docker build -f docker/Dockerfile --target release -t securebuild:sbom .

      - name: Generate SPDX and CycloneDX SBOMs
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: securebuild:sbom
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: securebuild:sbom
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf
        with:
          name: sbomartifacts
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
          if-no-files-found: error

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Scan repository filesystem
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-fs-report.txt
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: '0'
          vuln-type: os,library

      - name: Upload repository report
        if: always()
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf
        with:
          name: trivyfilesystemreport
          path: trivy-fs-report.txt
          if-no-files-found: warn
